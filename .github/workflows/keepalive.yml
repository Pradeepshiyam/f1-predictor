# Supabase Keep-Alive
# Runs every 5 days — pings Supabase so it never pauses (free tier pauses after 7 days)
# This action is FREE — public repo GitHub Actions = unlimited minutes

name: Supabase Keep-Alive

on:
  schedule:
    # Every 5 days at 06:00 UTC (well within the 7-day pause window)
    - cron: "0 6 */5 * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pip install psycopg2-binary --quiet
          python -c "
          import psycopg2, os, datetime
          url = os.environ.get('SUPABASE_DB_URL', '')
          if not url:
              print('SUPABASE_DB_URL secret not set — skipping ping')
              exit(0)
          try:
              conn = psycopg2.connect(url)
              cur = conn.cursor()
              cur.execute('SELECT 1')
              conn.close()
              print(f'Supabase ping OK at {datetime.datetime.utcnow()} UTC')
          except Exception as e:
              print(f'Ping failed: {e}')
              exit(1)
          "
